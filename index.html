<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <h1>Snake</h1>
        <div class="stats">
          <span>Score: <strong id="score">0</strong></span>
          <span id="status">Running</span>
        </div>
      </header>

      <section class="board-wrap" aria-label="Snake board">
        <div id="board" class="board" role="application" aria-label="Snake game grid"></div>
      </section>

      <section class="actions">
        <button id="restart" type="button">Restart</button>
        <button id="pause" type="button">Pause</button>
        <button id="replay" type="button">Replay Last Run</button>
      </section>

      <section class="controls" aria-label="Touch controls">
        <button data-dir="up" type="button">Up</button>
        <div class="controls-row">
          <button data-dir="left" type="button">Left</button>
          <button data-dir="down" type="button">Down</button>
          <button data-dir="right" type="button">Right</button>
        </div>
      </section>

      <section class="achievements" aria-label="Achievements">
        <h2>Achievements</h2>
        <ul id="achievement-list"></ul>
      </section>

      <p class="hint">Use Arrow keys or WASD. Press Space to pause/resume. Press R to replay your last run.</p>
    </main>

    <script type="module" src="./snake.js"></script>
  </body>
</html>
